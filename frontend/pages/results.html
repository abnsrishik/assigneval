<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results — Assignment Evaluator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0d1b2a;
        --navy2: #1b2e45;
        --blue: #1565c0;
        --blue-lt: #1e88e5;
        --orange: #ff6b35;
        --white: #fff;
        --off: #f0f4f8;
        --muted: #607d8b;
        --text: #1a2332;
        --green: #2e7d32;
        --green-lt: #43a047;
        --red: #c62828;
        --amber: #f57f17;
        --purple: #6a1b9a;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--off);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: var(--navy);
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 3px solid var(--orange);
        position: sticky;
        top: 0;
        z-index: 200;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        text-decoration: none;
      }
      .logo span {
        color: var(--orange);
      }
      .hbtn {
        padding: 7px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        font-family: "DM Sans", sans-serif;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .hbtn-outline {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .hbtn-green {
        background: var(--green);
        color: #fff;
      }
      .hbtn-green:hover {
        background: var(--green-lt);
      }

      /* ── Layout ── */
      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 24px 20px;
      }

      /* ── Assignment Banner ── */
      .assign-banner {
        background: var(--navy);
        border-radius: 16px;
        padding: 24px 28px;
        margin-bottom: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
      }
      .assign-left h1 {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 4px;
      }
      .assign-meta {
        font-size: 13px;
        color: #90a4ae;
      }
      .assign-stats {
        display: flex;
        gap: 28px;
        flex-wrap: wrap;
      }
      .astat {
        text-align: center;
      }
      .astat-val {
        font-family: "Syne", sans-serif;
        font-size: 26px;
        font-weight: 800;
        color: #fff;
      }
      .astat-label {
        font-size: 11px;
        color: #78909c;
        margin-top: 2px;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 20px;
      }
      .filter-btn {
        padding: 7px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid #d1d9e0;
        background: #fff;
        color: var(--muted);
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .filter-btn.active {
        background: var(--navy);
        color: #fff;
        border-color: var(--navy);
      }
      .search-input {
        padding: 8px 14px;
        border: 1.5px solid #d1d9e0;
        border-radius: 8px;
        font-size: 13px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        min-width: 200px;
        background: #fff;
      }
      .search-input:focus {
        border-color: var(--blue-lt);
      }
      .ml-auto {
        margin-left: auto;
      }

      /* ── Submission Cards Grid ── */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
        gap: 18px;
      }

      /* ── Submission Card ── */
      .sub-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.2s;
      }
      .sub-card:hover {
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.09);
        transform: translateY(-2px);
      }

      .card-head {
        padding: 16px 18px 12px;
        border-bottom: 1px solid #f0f4f8;
      }
      .card-head-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .student-name {
        font-size: 15px;
        font-weight: 700;
      }
      .student-roll {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 9px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .badge-typed {
        background: #e3f2fd;
        color: #1565c0;
      }
      .badge-handwritten {
        background: #f3e5f5;
        color: #6a1b9a;
      }
      .badge-mixed {
        background: #fff8e1;
        color: #e65100;
      }
      .badge-approved {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .badge-pending {
        background: #fff8e1;
        color: #e65100;
      }
      .badge-overridden {
        background: #e3f2fd;
        color: #1565c0;
      }
      .badge-review {
        background: #ffebee;
        color: #c62828;
      }

      /* ── Score section ── */
      .score-section {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        background: #fafbfc;
        border-bottom: 1px solid #f0f4f8;
      }
      .ring-wrap {
        position: relative;
        width: 60px;
        height: 60px;
        flex-shrink: 0;
      }
      .ring-wrap svg {
        transform: rotate(-90deg);
      }
      .ring-bg {
        fill: none;
        stroke: #e2e8f0;
        stroke-width: 5;
      }
      .ring-fill {
        fill: none;
        stroke-width: 5;
        stroke-linecap: round;
      }
      .ring-text {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
      }
      .ring-num {
        font-size: 13px;
        font-weight: 800;
        line-height: 1;
      }
      .ring-max {
        font-size: 9px;
        color: var(--muted);
      }
      .score-info {
        flex: 1;
      }
      .score-pct {
        font-family: "Syne", sans-serif;
        font-size: 20px;
        font-weight: 800;
      }
      .score-grade {
        font-size: 12px;
        font-weight: 600;
        margin-top: 2px;
      }
      .score-note {
        font-size: 10px;
        color: var(--muted);
        margin-top: 3px;
      }

      /* ── Feedback preview ── */
      .card-body {
        padding: 12px 18px;
      }
      .feedback-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .feedback-text {
        font-size: 12px;
        color: #455a64;
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── Card actions ── */
      .card-actions {
        display: flex;
        gap: 8px;
        padding: 12px 18px;
        border-top: 1px solid #f0f4f8;
        background: #fafbfc;
      }
      .cact {
        flex: 1;
        padding: 8px 6px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        font-family: "DM Sans", sans-serif;
        transition: all 0.15s;
        text-align: center;
      }
      .cact-review {
        background: var(--navy);
        color: #fff;
      }
      .cact-review:hover {
        background: var(--blue);
      }
      .cact-pdf {
        background: var(--off);
        color: var(--text);
        border: 1px solid #e2e8f0;
      }
      .cact-pdf:hover {
        background: #e2e8f0;
      }

      /* ── MODAL ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: flex-start;
        justify-content: center;
        z-index: 500;
        padding: 20px;
        overflow-y: auto;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 20px;
        width: 100%;
        max-width: 820px;
        margin: auto;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.25);
      }

      .modal-header {
        background: var(--navy);
        padding: 20px 24px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .modal-header h2 {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 3px;
      }
      .modal-header-sub {
        font-size: 12px;
        color: #90a4ae;
      }
      .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-close:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .modal-body {
        padding: 24px;
        max-height: 80vh;
        overflow-y: auto;
      }

      /* Submission type banner inside modal */
      .type-banner {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 13px;
        font-weight: 500;
      }
      .type-banner-handwritten {
        background: #f3e5f5;
        color: #4a148c;
        border: 1px solid #ce93d8;
      }
      .type-banner-mixed {
        background: #fff8e1;
        color: #e65100;
        border: 1px solid #ffcc02;
      }
      .type-banner-typed {
        background: #e3f2fd;
        color: #0d47a1;
        border: 1px solid #90caf9;
      }
      .type-banner-icon {
        font-size: 22px;
      }

      /* Breakdown table */
      .section-title {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .breakdown-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
        font-size: 13px;
      }
      .breakdown-table th {
        background: var(--navy);
        color: #fff;
        padding: 10px 12px;
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .breakdown-table td {
        padding: 10px 12px;
        border-bottom: 1px solid #f0f4f8;
        vertical-align: top;
      }
      .breakdown-table tr:hover td {
        background: #fafbff;
      }
      .marks-cell {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 14px;
      }
      .correct-text {
        color: #2e7d32;
        font-size: 12px;
      }
      .missing-text {
        color: #c62828;
        font-size: 12px;
      }
      .reason-text {
        color: #546e7a;
        font-size: 11px;
        font-style: italic;
      }

      /* AI Feedback box */
      .feedback-box {
        background: #f8f9fa;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 20px;
      }
      .feedback-box p {
        font-size: 13px;
        color: #37474f;
        line-height: 1.7;
      }

      /* Teacher review section */
      .review-section {
        background: #fffde7;
        border: 1.5px solid #fdd835;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .review-section h4 {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: #f57f17;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .review-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .rtab {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid #e2e8f0;
        background: #fff;
        font-family: "DM Sans", sans-serif;
        transition: all 0.2s;
      }
      .rtab.active {
        background: var(--navy);
        color: #fff;
        border-color: var(--navy);
      }

      .review-approve {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .review-override {
        display: flex;
        flex-direction: column;
        gap: 12px;
        display: none;
      }

      .marks-input-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .marks-input-row label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        min-width: 120px;
      }
      .marks-input {
        width: 90px;
        padding: 9px 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 700;
        font-family: "Syne", sans-serif;
        outline: none;
        text-align: center;
      }
      .marks-input:focus {
        border-color: var(--blue-lt);
      }
      .marks-max {
        font-size: 13px;
        color: var(--muted);
      }

      .feedback-input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 13px;
        font-family: "DM Sans", sans-serif;
        resize: vertical;
        min-height: 90px;
        outline: none;
        color: var(--text);
      }
      .feedback-input:focus {
        border-color: var(--blue-lt);
      }

      .review-btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .rbtn {
        padding: 10px 22px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        font-family: "DM Sans", sans-serif;
        transition: all 0.2s;
      }
      .rbtn-approve {
        background: #2e7d32;
        color: #fff;
      }
      .rbtn-approve:hover {
        background: #388e3c;
      }
      .rbtn-override {
        background: var(--blue);
        color: #fff;
      }
      .rbtn-override:hover {
        background: var(--blue-lt);
      }
      .rbtn-cancel {
        background: #f0f4f8;
        color: var(--text);
      }
      .rbtn-cancel:hover {
        background: #e2e8f0;
      }

      /* Already approved display */
      .approved-display {
        background: #e8f5e9;
        border: 1px solid #a5d6a7;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 16px;
      }
      .approved-display strong {
        color: #2e7d32;
        font-size: 14px;
      }
      .approved-display p {
        font-size: 12px;
        color: #388e3c;
        margin-top: 4px;
      }

      /* PDF viewer link */
      .pdf-link-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        background: #e3f2fd;
        border: 1px solid #90caf9;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .pdf-link-row a {
        color: #1565c0;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
      }
      .pdf-link-row a:hover {
        text-decoration: underline;
      }

      /* Empty / loading */
      .empty {
        text-align: center;
        padding: 60px;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .spinner-wrap {
        text-align: center;
        padding: 60px;
      }
      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--navy);
        color: #fff;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        z-index: 1000;
        transform: translateY(60px);
        opacity: 0;
        transition: all 0.3s;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.success {
        background: #2e7d32;
      }
      .toast.error {
        background: #c62828;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <a class="logo" href="../index.html">Assign<span>Eval</span></a>
      <div style="display: flex; gap: 10px">
        <a class="hbtn hbtn-outline" href="teacher.html">← Dashboard</a>
        <button class="hbtn hbtn-green" onclick="downloadExcel()" id="excelBtn">
          ⬇ Export Excel
        </button>
      </div>
    </header>

    <div class="container">
      <!-- Assignment Banner -->
      <div class="assign-banner" id="assignBanner">
        <div class="assign-left">
          <div
            style="
              font-size: 11px;
              font-family: &quot;JetBrains Mono&quot;, monospace;
              color: #78909c;
              margin-bottom: 4px;
            "
          >
            ASSIGNMENT RESULTS
          </div>
          <h1 id="assignTitle">Loading...</h1>
          <div class="assign-meta" id="assignMeta"></div>
        </div>
        <div class="assign-stats">
          <div class="astat">
            <div class="astat-val" id="statTotal">—</div>
            <div class="astat-label">Submissions</div>
          </div>
          <div class="astat">
            <div class="astat-val" id="statPending" style="color: #ffd54f">
              —
            </div>
            <div class="astat-label">Pending Review</div>
          </div>
          <div class="astat">
            <div class="astat-val" id="statApproved" style="color: #81c784">
              —
            </div>
            <div class="astat-label">Approved</div>
          </div>
          <div class="astat">
            <div class="astat-val" id="statAvg" style="color: #90caf9">—</div>
            <div class="astat-label">Avg Score</div>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <button class="filter-btn active" onclick="setFilter('all', this)">
          All
        </button>
        <button class="filter-btn" onclick="setFilter('pending', this)">
          ⏳ Pending Review
        </button>
        <button class="filter-btn" onclick="setFilter('approved', this)">
          ✅ Approved
        </button>
        <button class="filter-btn" onclick="setFilter('handwritten', this)">
          ✍ Handwritten
        </button>
        <button class="filter-btn" onclick="setFilter('mixed', this)">
          📄 Mixed
        </button>
        <button class="filter-btn" onclick="setFilter('typed', this)">
          ⌨ Typed
        </button>
        <input
          class="search-input ml-auto"
          id="searchInput"
          placeholder="🔍 Search by name or roll..."
          oninput="renderCards()"
        />
      </div>

      <!-- Cards -->
      <div id="cardsWrap">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════
     REVIEW MODAL
══════════════════════════════════════════════ -->
    <div
      class="modal-overlay"
      id="modalOverlay"
      onclick="if (event.target === this) closeModal();"
    >
      <div class="modal" id="modal">
        <div class="modal-header">
          <div>
            <h2 id="mStudentName">Student Name</h2>
            <div class="modal-header-sub" id="mStudentMeta"></div>
          </div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>

        <div class="modal-body" id="modalBody">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API =
        window.location.hostname === "localhost"
          ? "http://localhost:5000/api"
          : window.location.origin + "/api";
      const params = new URLSearchParams(location.search);
      const ASSIGNMENT_ID = params.get("assignment_id");

      let allSubs = [];
      let assignData = {};
      let currentFilter = "all";
      let currentSubId = null;

      // ── Init ──────────────────────────────────────────────────────────────────
      if (!ASSIGNMENT_ID) {
        document.getElementById("cardsWrap").innerHTML =
          `<div class="empty"><div class="empty-icon">❌</div>No assignment ID in URL.<br>Open this from the Teacher Dashboard.</div>`;
      } else {
        loadData();
      }

      async function loadData() {
        try {
          const res = await fetch(`${API}/teacher/results/${ASSIGNMENT_ID}`);
          if (!res.ok) throw new Error("Not found");
          const data = await res.json();
          assignData = data.assignment;
          allSubs = data.submissions;
          renderBanner();
          renderCards();
        } catch (e) {
          document.getElementById("cardsWrap").innerHTML =
            `<div class="empty"><div class="empty-icon">❌</div>${e.message}<br><small>Is the backend running?</small></div>`;
        }
      }

      // ── Banner ────────────────────────────────────────────────────────────────
      function renderBanner() {
        document.getElementById("assignTitle").textContent = assignData.title;
        document.getElementById("assignMeta").textContent =
          `${assignData.subject} · ${assignData.teacher_name} · Max: ${assignData.max_marks} marks`;

        const pending = allSubs.filter((s) => !s.teacher_approved).length;
        const approved = allSubs.filter((s) => s.teacher_approved).length;
        const marks = allSubs.map((s) => s.final_marks || s.ai_marks || 0);
        const avg = marks.length
          ? Math.round(marks.reduce((a, b) => a + b, 0) / marks.length)
          : 0;

        document.getElementById("statTotal").textContent = allSubs.length;
        document.getElementById("statPending").textContent = pending;
        document.getElementById("statApproved").textContent = approved;
        document.getElementById("statAvg").textContent =
          avg + "/" + assignData.max_marks;
      }

      // ── Filter & Search ───────────────────────────────────────────────────────
      function setFilter(f, btn) {
        currentFilter = f;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderCards();
      }

      function renderCards() {
        const q = document.getElementById("searchInput").value.toLowerCase();

        let subs = allSubs.filter((s) => {
          if (
            q &&
            !s.student_name.toLowerCase().includes(q) &&
            !s.roll_number.toLowerCase().includes(q)
          )
            return false;
          if (currentFilter === "pending") return !s.teacher_approved;
          if (currentFilter === "approved") return s.teacher_approved;
          if (currentFilter === "handwritten")
            return s.submission_type === "handwritten";
          if (currentFilter === "mixed") return s.submission_type === "mixed";
          if (currentFilter === "typed") return s.submission_type === "typed";
          return true;
        });

        if (!subs.length) {
          document.getElementById("cardsWrap").innerHTML =
            `<div class="empty"><div class="empty-icon">📭</div>No submissions match this filter.</div>`;
          return;
        }

        document.getElementById("cardsWrap").innerHTML =
          `<div class="cards-grid">${subs.map(cardHTML).join("")}</div>`;
      }

      function cardHTML(s) {
        const final = s.teacher_marks ?? s.ai_marks ?? 0;
        const max = s.max_marks || assignData.max_marks || 100;
        const pct = Math.round((final / max) * 100);
        const grade = getGrade(pct);
        const color = gradeColor(pct);
        const circ = 2 * Math.PI * 25;
        const dash = (pct / 100) * circ;

        const typeBadge =
          {
            typed: `<span class="badge badge-typed">⌨ Typed</span>`,
            handwritten: `<span class="badge badge-handwritten">✍ Handwritten</span>`,
            mixed: `<span class="badge badge-mixed">📄 Mixed</span>`,
          }[s.submission_type] || "";

        const statusBadge =
          s.teacher_approved == 2
            ? `<span class="badge badge-overridden">✏ Overridden</span>`
            : s.teacher_approved == 1
              ? `<span class="badge badge-approved">✅ Approved</span>`
              : `<span class="badge badge-pending">⏳ Pending</span>`;

        const reviewNeeded = s.needs_review
          ? `<span class="badge badge-review">⚠ Needs Review</span>`
          : "";

        const feedback =
          (s.ai_feedback || "No feedback available.").slice(0, 160) + "...";

        return `
  <div class="sub-card">
    <div class="card-head">
      <div class="card-head-top">
        <div>
          <div class="student-name">${s.student_name}</div>
          <div class="student-roll">${s.roll_number}</div>
        </div>
      </div>
      <div class="badges">${typeBadge}${statusBadge}${reviewNeeded}</div>
    </div>

    <div class="score-section">
      <div class="ring-wrap">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle class="ring-bg" cx="30" cy="30" r="25"/>
          <circle class="ring-fill" cx="30" cy="30" r="25"
            stroke="${color}"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"/>
        </svg>
        <div class="ring-text">
          <span class="ring-num" style="color:${color}">${final}</span>
          <span class="ring-max">/${max}</span>
        </div>
      </div>
      <div class="score-info">
        <div class="score-pct" style="color:${color}">${pct}%</div>
        <div class="score-grade" style="color:${color}">${grade.label}</div>
        <div class="score-note">${s.teacher_marks != null ? "✏ Teacher verified" : "🤖 AI evaluated"}</div>
      </div>
    </div>

    <div class="card-body">
      <div class="feedback-label">AI Feedback Preview</div>
      <div class="feedback-text">${feedback}</div>
    </div>

    <div class="card-actions">
      <button class="cact cact-review" onclick="openModal('${s.submission_id}')">
        ${s.teacher_approved ? "📋 View & Edit" : "📝 Review & Approve"}
      </button>
      <button class="cact cact-pdf" onclick="window.open('${API}/teacher/view-pdf/${s.submission_id}','_blank')">
        📄 PDF
      </button>
    </div>
  </div>`;
      }

      // ── MODAL ─────────────────────────────────────────────────────────────────
      async function openModal(subId) {
        currentSubId = subId;
        document.getElementById("modalOverlay").classList.add("open");
        document.getElementById("modalBody").innerHTML =
          `<div class="spinner-wrap"><div class="spinner"></div></div>`;

        try {
          const res = await fetch(`${API}/teacher/submission/${subId}`);
          const s = await res.json();
          renderModal(s);
        } catch (e) {
          document.getElementById("modalBody").innerHTML =
            `<div class="empty">Failed to load submission details.</div>`;
        }
      }

      function renderModal(s) {
        const max = s.max_marks || 100;
        const final = s.teacher_marks ?? s.ai_marks ?? 0;
        const pct = Math.round((final / max) * 100);

        // Header
        document.getElementById("mStudentName").textContent = s.student_name;
        document.getElementById("mStudentMeta").textContent =
          `${s.roll_number} · ${s.submission_type.toUpperCase()} · Submitted ${new Date(s.submitted_at).toLocaleString()}`;

        // Submission type banner
        const typeMessages = {
          handwritten: {
            icon: "✍",
            text: "Handwritten submission — AI used vision OCR to read the content. Please verify the PDF directly.",
            cls: "type-banner-handwritten",
          },
          mixed: {
            icon: "📄",
            text: "Mixed submission (typed + images/diagrams). AI evaluated the text portion. Please verify diagram/handwritten sections.",
            cls: "type-banner-mixed",
          },
          typed: {
            icon: "⌨",
            text: "Typed/digital submission — AI extracted and evaluated text directly.",
            cls: "type-banner-typed",
          },
        };
        const tm = typeMessages[s.submission_type] || typeMessages.typed;

        // Breakdown table
        const breakdown = Array.isArray(s.ai_breakdown) ? s.ai_breakdown : [];
        const breakdownHTML = breakdown.length
          ? `
    <div class="section-title">📊 Question-by-Question Breakdown</div>
    <table class="breakdown-table">
      <thead>
        <tr>
          <th>Question / Section</th>
          <th style="text-align:center;">Max</th>
          <th style="text-align:center;">Awarded</th>
          <th>What Was Correct</th>
          <th>What Was Missing</th>
        </tr>
      </thead>
      <tbody>
        ${breakdown
          .map(
            (q) => `
          <tr>
            <td><strong>${q.question || "—"}</strong><br><span class="reason-text">${q.reason || ""}</span></td>
            <td style="text-align:center;font-weight:600;">${q.max_marks ?? "—"}</td>
            <td style="text-align:center;" class="marks-cell" style="color:${gradeColor(Math.round(((q.awarded_marks || 0) / (q.max_marks || 1)) * 100))}">
              ${q.awarded_marks ?? "—"}
            </td>
            <td class="correct-text">✓ ${q.what_was_correct || "—"}</td>
            <td class="missing-text">✗ ${q.what_was_missing || "—"}</td>
          </tr>`,
          )
          .join("")}
      </tbody>
    </table>`
          : "";

        // Approved display or review form
        const approvedHTML = s.teacher_approved
          ? `
    <div class="approved-display">
      <strong>${s.teacher_approved == 2 ? "✏ Teacher Overridden" : "✅ Teacher Approved"}</strong>
      <p>Final marks: ${final}/${max} · Reviewed at ${new Date(s.reviewed_at || Date.now()).toLocaleString()}</p>
      ${s.teacher_feedback ? `<p style="margin-top:6px;font-size:12px;">"${s.teacher_feedback}"</p>` : ""}
    </div>`
          : "";

        document.getElementById("modalBody").innerHTML = `
    <!-- Type Banner -->
    <div class="type-banner ${tm.cls}">
      <span class="type-banner-icon">${tm.icon}</span>
      <span>${tm.text}</span>
    </div>

    <!-- PDF Link -->
    <div class="pdf-link-row">
      📎 <a href="${API}/teacher/view-pdf/${s.submission_id}" target="_blank">
        Open student's submitted PDF in new tab →
      </a>
    </div>

    <!-- Breakdown -->
    ${breakdownHTML}

    <!-- AI Feedback -->
    <div class="section-title">💬 Detailed AI Feedback <span style="font-size:11px;color:var(--muted);font-weight:400;">(shown to student)</span></div>
    <div class="feedback-box">
      <p>${(s.ai_feedback || "No feedback generated.").replace(/\n/g, "<br>")}</p>
    </div>

    <!-- Already approved? -->
    ${approvedHTML}

    <!-- Review Section -->
    <div class="review-section">
      <h4>⚖️ Teacher Decision
        <span style="font-size:11px;font-weight:400;color:#795548;">
          AI gave: ${s.ai_marks}/${max} (${Math.round(((s.ai_marks || 0) / max) * 100)}%) · Your final mark will update the student's score
        </span>
      </h4>

      <div class="review-tabs">
        <button class="rtab active" id="tabApprove" onclick="switchTab('approve')">
          ✅ Approve AI Marks
        </button>
        <button class="rtab" id="tabOverride" onclick="switchTab('override')">
          ✏ Override with My Marks
        </button>
      </div>

      <!-- Approve panel -->
      <div class="review-approve" id="panelApprove">
        <p style="font-size:13px;color:#5D4037;margin-bottom:10px;">
          Approve the AI's evaluation as-is. The student's final score will be
          <strong>${s.ai_marks}/${max} (${Math.round(((s.ai_marks || 0) / max) * 100)}%)</strong>.
        </p>
        <div class="review-btns">
          <button class="rbtn rbtn-approve" onclick="submitReview('approve')">
            ✅ Approve ${s.ai_marks}/${max}
          </button>
          <button class="rbtn rbtn-cancel" onclick="closeModal()">Cancel</button>
        </div>
      </div>

      <!-- Override panel -->
      <div class="review-override" id="panelOverride">
        <div class="marks-input-row">
          <label>Your Marks:</label>
          <input class="marks-input" type="number" id="overrideMarks"
            min="0" max="${max}" value="${s.ai_marks ?? 0}" placeholder="0">
          <span class="marks-max">/ ${max}</span>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;">
            Your Feedback to Student (explain the marks you are giving):
          </label>
          <textarea class="feedback-input" id="overrideFeedback"
            placeholder="Explain clearly why you are giving these marks. This will be shown to the student and will affect their CGPA. Be specific about what was correct, what was missing, and how they can improve.">${s.ai_feedback || ""}</textarea>
        </div>
        <div class="review-btns">
          <button class="rbtn rbtn-override" onclick="submitReview('override')">
            ✏ Save My Marks
          </button>
          <button class="rbtn rbtn-cancel" onclick="closeModal()">Cancel</button>
        </div>
      </div>

    </div>`;
      }

      function switchTab(tab) {
        document
          .getElementById("tabApprove")
          .classList.toggle("active", tab === "approve");
        document
          .getElementById("tabOverride")
          .classList.toggle("active", tab === "override");
        document.getElementById("panelApprove").style.display =
          tab === "approve" ? "flex" : "none";
        document.getElementById("panelOverride").style.display =
          tab === "override" ? "flex" : "none";
      }

      async function submitReview(action) {
        const body = { action };

        if (action === "override") {
          const marks = parseInt(
            document.getElementById("overrideMarks").value,
          );
          const feedback = document
            .getElementById("overrideFeedback")
            .value.trim();
          if (isNaN(marks) || marks < 0) {
            showToast("Enter valid marks", "error");
            return;
          }
          if (!feedback) {
            showToast("Please write feedback for the student", "error");
            return;
          }
          body.marks = marks;
          body.feedback = feedback;
        }

        try {
          const res = await fetch(`${API}/teacher/review/${currentSubId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);

          showToast(
            action === "approve" ? "✅ Approved!" : "✅ Marks saved!",
            "success",
          );
          closeModal();
          await loadData(); // Refresh cards
        } catch (e) {
          showToast("Error: " + e.message, "error");
        }
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
        currentSubId = null;
      }

      // ── Excel ─────────────────────────────────────────────────────────────────
      function downloadExcel() {
        window.open(`${API}/teacher/download-excel/${ASSIGNMENT_ID}`, "_blank");
      }

      // ── Grade helpers ─────────────────────────────────────────────────────────
      function getGrade(pct) {
        if (pct >= 90) return { label: "O — Outstanding", points: 10 };
        if (pct >= 80) return { label: "A+ — Excellent", points: 9 };
        if (pct >= 70) return { label: "A — Very Good", points: 8 };
        if (pct >= 60) return { label: "B+ — Good", points: 7 };
        if (pct >= 50) return { label: "B — Above Average", points: 6 };
        if (pct >= 40) return { label: "C — Average", points: 5 };
        return { label: "F — Fail", points: 0 };
      }

      function gradeColor(pct) {
        if (pct >= 75) return "#2E7D32";
        if (pct >= 50) return "#F57F17";
        return "#C62828";
      }

      // ── Toast ────────────────────────────────────────────────────────────────
      function showToast(msg, type = "") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove("show"), 3000);
      }
    </script>
  </body>
</html>
